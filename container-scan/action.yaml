name: Container Security Scan
description: Scans container images for vulnerabilities using Wiz CLI

inputs:
  image-name:
    required: false
    description: Docker image name
  image-tag:
    required: true
    description: Docker image tag
  image-platform:
    description: Target platform to build image for (eg. linux/amd64 (default), linux/arm64, etc)
  enable-docker-build:
    required: false
    default: "true"
    description: Enable Docker build
  image-tags:
    required: false
    description: List of tags as key-value pair attributes
    default: ""
  artifactory-username:
    required: false
    description: Artifactory username
  artifactory-auth-token:
    required: false
    description: Artifactory auth token
  build-args:
    required: false
    description: List of build arguments for docker build as key-value pairs
  build-contexts:
    required: false
    description: List of additional build contexts (e.g., name=path)
    default: ""
  docker-config-file:
    required: false
    description: Path to the docker config file (defaults to .docker-config.json) Must contain imageName, may contain dockerfile
    default: .docker-config.json
  github-token:
    required: false
    description: GitHub token
  secrets:
    required: false
    description: List of secrets for docker build as key-value pairs (e.g., SECRET_KEY=VALUE)
  dockerhub-user:
    required: true
    description: DockerHub username
  dockerhub-password:
    required: true
    description: DockerHub password
  MAX_MIND_USER:
    required: false
    description: MaxMind User ID
  MAX_MIND_LICENSE_KEY:
    required: false
    description: MaxMind License Key
  vfunction-file:
    required: false
    description: Vfunction file name
  target:
    required: false
    description: Target build stage for multi-stage Docker builds
  wiz-client-id:
    required: true
    description: Wiz Client ID for service account authentication
  wiz-client-secret:
    required: true
    description: Wiz Client Secret for service account authentication
  container-setup-commands:
    required: false
    description: Commands to set up the container environment
  aws-access-key-id:
    required: false
    description: AWS Access Key ID
  aws-secret-access-key:
    required: false
    description: AWS Secret Access Key

outputs:
  stdout:
    description: The complete output from the Wiz CLI scan
    value: ${{ steps.scan.outputs.stdout }}
  has_findings:
    description: Whether the scan found any issues
    value: ${{ steps.scan.outputs.has_findings }}
  scan_status:
    description: Status of the scan (success/failure)
    value: ${{ steps.scan.outputs.scan_status }}
  vulnerabilities:
    description: Summary of vulnerability counts
    value: ${{ steps.scan.outputs.vulnerabilities }}
  critical_count:
    description: Count of critical vulnerabilities
    value: ${{ steps.scan.outputs.critical_count }}
  high_count:
    description: Count of high vulnerabilities
    value: ${{ steps.scan.outputs.high_count }}
  medium_count:
    description: Count of medium vulnerabilities
    value: ${{ steps.scan.outputs.medium_count }}
  low_count:
    description: Count of low vulnerabilities
    value: ${{ steps.scan.outputs.low_count }}
  scan_url:
    description: URL to the scan report
    value: ${{ steps.scan.outputs.scan_url }}

runs:
  using: composite
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Wiz CLI
      run: |
        curl -o wizcli https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64
        chmod +x wizcli
        sudo mv wizcli /usr/local/bin/
      shell: bash

    - name: Authenticate with Wiz
      run: wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
      env:
        WIZ_CLIENT_ID: ${{ inputs.wiz-client-id }}
        WIZ_CLIENT_SECRET: ${{ inputs.wiz-client-secret }}
      shell: bash

    - name: Setup Tools
      uses: open-turo/action-setup-tools@v2

    - name: Run Container Setup Commands
      if: inputs.container-setup-commands != ''
      shell: bash
      run: |
        echo "Running container setup commands after checkout"
        ${{ inputs.container-setup-commands }}
      env:
        # AWS Credentials
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        # Artifactory Credentials
        ARTIFACTORY_USERNAME: ${{ inputs.artifactory-username }}
        ARTIFACTORY_AUTH_TOKEN: ${{ inputs.artifactory-auth-token }}
        # Other common secrets
        MAX_MIND_LICENSE_KEY: ${{ inputs.MAX_MIND_LICENSE_KEY }}
        DOCKER_USERNAME: ${{ inputs.dockerhub-user }}
        DOCKER_PASSWORD: ${{ inputs.dockerhub-password }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-user }}
        password: ${{ inputs.dockerhub-password }}

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image-tag }}
        flavor: |
          latest=false
        tags: |
          ${{ inputs.image-tags }}

    - name: Build docker image
      if: ${{ inputs.enable-docker-build == 'true' }}
      uses: open-turo/actions-security/docker-build@v3
      id: docker-build
      with:
        docker-config-file: ${{ inputs.docker-config-file }}
        dockerhub-user: ${{ inputs.dockerhub-user }}
        dockerhub-password: ${{ inputs.dockerhub-password }}
        github-token: ${{ inputs.github-token }}
        image-platform: ${{ inputs.image-platform }}
        image-version: ${{ inputs.image-tag }}
        target: ${{ inputs.target }}
        build-contexts: ${{ inputs.build-contexts }}
        build-args: |
          ARTIFACTORY_USERNAME=${{ inputs.artifactory-username }}
          ARTIFACTORY_AUTH_TOKEN=${{ inputs.artifactory-auth-token }}
          MAX_MIND_LICENSE_KEY=${{ inputs.MAX_MIND_LICENSE_KEY }}
          ${{ inputs.build-args }}
        secrets: ${{ inputs.secrets }}

    - name: Determine Image Name
      id: set_image_name
      run: |
        echo "image_name=${{ steps.docker-build.outputs.image-name }}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Get Dockerfile Path
      id: dockerfile-config
      run: |
        # Default to Dockerfile in current directory
        DOCKERFILE="./Dockerfile"

        # Check if docker config file exists and use it if available
        if [ -f "${{ inputs.docker-config-file }}" ]; then
          CONFIG_DOCKERFILE=$(jq -r '.dockerfile // ""' ${{ inputs.docker-config-file }})
          if [ -n "$CONFIG_DOCKERFILE" ]; then
            DOCKERFILE="$CONFIG_DOCKERFILE"
          fi
        fi

        # Verify file exists
        if [ -f "$DOCKERFILE" ]; then
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
        else
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
          echo "::warning::Dockerfile not found at $DOCKERFILE, scanning without Dockerfile metadata"
        fi
      shell: bash

    - name: Scan Container Image
      id: scan
      run: |
        # Build scan command
        SCAN_CMD="wizcli docker scan --image ${{ steps.docker-build.outputs.image-with-tag }}"

        # Add dockerfile if it exists
        if [ "${{ steps.dockerfile-config.outputs.dockerfile_exists }}" == "true" ]; then
          SCAN_CMD="$SCAN_CMD --dockerfile ${{ steps.dockerfile-config.outputs.dockerfile }}"
        fi

        # Add common scan options
        SCAN_CMD="$SCAN_CMD --show-vulnerability-details --format json"

        # Add output file option for raw results
        RAW_RESULTS="${{ github.workspace }}/raw_results.stdout"
        SCAN_CMD="$SCAN_CMD --output $RAW_RESULTS,json"

        # Run the scan and capture output and exit code
        echo "Running scan command: $SCAN_CMD"
        EXIT_CODE=0
        SCAN_OUTPUT=$($SCAN_CMD 2>&1) || EXIT_CODE=$?
        echo "Scan completed with exit code: $EXIT_CODE"

        # Define the output JSON file path
        RESULTS_JSON="${{ github.workspace }}/results.json"

        # Extract vulnerability counts - this is the most important data
        if grep -q '"vulnerabilities":{' "$RAW_RESULTS"; then
          echo "Found analytics.vulnerabilities section, extracting counts..."
          CRITICAL_COUNT=$(grep -o '"criticalCount":[0-9]\+' "$RAW_RESULTS" | head -1 | grep -o '[0-9]\+' || echo "0")
          HIGH_COUNT=$(grep -o '"highCount":[0-9]\+' "$RAW_RESULTS" | head -1 | grep -o '[0-9]\+' || echo "0")
          MEDIUM_COUNT=$(grep -o '"mediumCount":[0-9]\+' "$RAW_RESULTS" | head -1 | grep -o '[0-9]\+' || echo "0")
          LOW_COUNT=$(grep -o '"lowCount":[0-9]\+' "$RAW_RESULTS" | head -1 | grep -o '[0-9]\+' || echo "0")
          INFO_COUNT=$(grep -o '"infoCount":[0-9]\+' "$RAW_RESULTS" | head -1 | grep -o '[0-9]\+' || echo "0")
          TOTAL_COUNT=$(grep -o '"totalCount":[0-9]\+' "$RAW_RESULTS" | head -1 | grep -o '[0-9]\+' || echo "0")
          UNFIXED_COUNT=$(grep -o '"unfixedCount":[0-9]\+' "$RAW_RESULTS" | head -1 | grep -o '[0-9]\+' || echo "0")
        else
          # Fallback to counting individual CVEs with each severity
          echo "No analytics section found, counting individual vulnerabilities..."
          CRITICAL_COUNT=$(grep -o '"severity":"CRITICAL"' "$RAW_RESULTS" | wc -l)
          HIGH_COUNT=$(grep -o '"severity":"HIGH"' "$RAW_RESULTS" | wc -l)
          MEDIUM_COUNT=$(grep -o '"severity":"MEDIUM"' "$RAW_RESULTS" | wc -l)
          LOW_COUNT=$(grep -o '"severity":"LOW"' "$RAW_RESULTS" | wc -l)
          INFO_COUNT=$(grep -o '"severity":"INFO"' "$RAW_RESULTS" | wc -l)
          TOTAL_COUNT=$((CRITICAL_COUNT + HIGH_COUNT + MEDIUM_COUNT + LOW_COUNT + INFO_COUNT))
          UNFIXED_COUNT=0
        fi

        # Ensure numeric values
        [[ "$CRITICAL_COUNT" =~ ^[0-9]+$ ]] || CRITICAL_COUNT=0
        [[ "$HIGH_COUNT" =~ ^[0-9]+$ ]] || HIGH_COUNT=0
        [[ "$MEDIUM_COUNT" =~ ^[0-9]+$ ]] || MEDIUM_COUNT=0
        [[ "$LOW_COUNT" =~ ^[0-9]+$ ]] || LOW_COUNT=0
        [[ "$INFO_COUNT" =~ ^[0-9]+$ ]] || INFO_COUNT=0
        [[ "$TOTAL_COUNT" =~ ^[0-9]+$ ]] || TOTAL_COUNT=$((CRITICAL_COUNT + HIGH_COUNT + MEDIUM_COUNT + LOW_COUNT + INFO_COUNT))
        [[ "$UNFIXED_COUNT" =~ ^[0-9]+$ ]] || UNFIXED_COUNT=0

        # Extract report URL
        REPORT_URL=$(grep -o '"reportUrl":"[^"]*"' "$RAW_RESULTS" | head -1 | sed 's/"reportUrl":"\(.*\)"/\1/')

        # Set scan status
        if [ "$EXIT_CODE" -eq 4 ] || [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
          SCAN_STATUS="warning"
          HAS_FINDINGS="true"
        elif [ "$EXIT_CODE" -ne 0 ]; then
          SCAN_STATUS="failure"
          HAS_FINDINGS="true"
        else
          SCAN_STATUS="success"
          HAS_FINDINGS="false"
        fi

        # Extract image name
        IMAGE_NAME="${{ steps.docker-build.outputs.image-with-tag }}"
        IMAGE_TAG="${{ inputs.image-tag || github.sha }}"

        # Prepare scanId
        SCAN_ID=$(grep -o '"id":"[^"]*"' "$RAW_RESULTS" | head -1 | grep -o '[^"]*"' | grep -o '[^"]*')
        [[ -z "$SCAN_ID" ]] && SCAN_ID="wiz-scan-$(date +%s)"

        # Create a clean, simple JSON file
        cat > "$RESULTS_JSON" << EOL
        {
          "scanId": "${SCAN_ID}",
          "imageName": "${IMAGE_NAME}",
          "imageTag": "${IMAGE_TAG}",
          "criticalCount": ${CRITICAL_COUNT},
          "highCount": ${HIGH_COUNT},
          "mediumCount": ${MEDIUM_COUNT},
          "lowCount": ${LOW_COUNT},
          "infoCount": ${INFO_COUNT},
          "totalCount": ${TOTAL_COUNT},
          "unfixedCount": ${UNFIXED_COUNT},
          "scanStatus": "${SCAN_STATUS}",
          "reportUrl": "${REPORT_URL}",
          "hasFindings": ${HAS_FINDINGS}
        }
        EOL

        echo "Created simplified results.json with vulnerability counts"
        cat "$RESULTS_JSON"

        # Extract the critical and high vulnerabilities for detailed reporting
        # First check if there are any detailed findings to extract
        if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
          echo "Extracting detailed vulnerability information for critical and high severity findings..."

          # Create a detailed findings file - this is optional and can be skipped if you prefer to keep it simple
          DETAILED_JSON="${{ github.workspace }}/detailed_findings.json"

          # We'll use sed commands to extract vulnerability sections - these are more reliable than complex JSON parsing

          # 1. First try to extract the most critical findings (typically in OS packages or libraries)
          # This simplified approach extracts vulnerability blobs from the JSON
          # This is a bit of a hack, but works well enough without requiring jq
          cat "$RAW_RESULTS" | tr -d '\n' | sed 's/},{/},\n{/g' | grep -E '"severity":"(CRITICAL|HIGH)"' > "$DETAILED_JSON" || true

          echo "Extracted $(wc -l < "$DETAILED_JSON") detailed findings for critical/high vulnerabilities"
        fi

        echo "Extracted vulnerability counts:"
        echo "Critical: $CRITICAL_COUNT"
        echo "High: $HIGH_COUNT"
        echo "Medium: $MEDIUM_COUNT"
        echo "Low: $LOW_COUNT"
        echo "Total: $TOTAL_COUNT"
        echo "Report URL: $REPORT_URL"

        # Export counts as outputs
        echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
        echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT
        echo "medium_count=$MEDIUM_COUNT" >> $GITHUB_OUTPUT
        echo "low_count=$LOW_COUNT" >> $GITHUB_OUTPUT

        # Create a clean vulnerability summary string
        VULN_SUMMARY="CRITICAL: $CRITICAL_COUNT, HIGH: $HIGH_COUNT, MEDIUM: $MEDIUM_COUNT, LOW: $LOW_COUNT"
        echo "vulnerabilities=$VULN_SUMMARY" >> $GITHUB_OUTPUT
        echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT

        # Save the stdout
        echo "stdout<<EOF" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # Set GitHub outputs based on findings
        echo "has_findings=$HAS_FINDINGS" >> $GITHUB_OUTPUT
        echo "scan_status=$SCAN_STATUS" >> $GITHUB_OUTPUT

        # Output appropriate message based on status
        if [ "$SCAN_STATUS" = "warning" ]; then
          echo "::warning::Container scan found security issues: $VULN_SUMMARY"
        elif [ "$SCAN_STATUS" = "failure" ]; then
          echo "::error::Container scan failed with exit code $EXIT_CODE"
        else
          echo "Container scan completed successfully with no issues found"
        fi

        # Preserve scan results
        cp "$RAW_RESULTS" "${{ github.workspace }}/results.stdout"
        echo "Scan results preserved at ${{ github.workspace }}/results.stdout ($(wc -c < "$RAW_RESULTS") bytes)"
        echo "Clean JSON results available at $RESULTS_JSON ($(wc -c < "$RESULTS_JSON") bytes)"
      shell: bash

    - name: Fetch digest of Docker image for Graph enrichment
      id: tag-image
      continue-on-error: true # Don't fail the workflow if this step fails
      run: |
        # make sure we have a proper image tag
        IMAGE_WITH_TAG="${{ steps.docker-build.outputs.image-with-tag }}"

        if [ -n "$IMAGE_WITH_TAG" ]; then
          echo "using image: $IMAGE_WITH_TAG"

          # image should be available locally
          docker image inspect "$IMAGE_WITH_TAG" &>/dev/null || {
            echo "image not found locally. attempting to pull..."
            docker pull "$IMAGE_WITH_TAG" || echo "failed to pull image. will tag anyway!"
          }

          # first, try to get the image digest
          LOCAL_DIGEST=$(docker inspect "$IMAGE_WITH_TAG" --format '{{.Id}}' | sed 's/^sha256://')
          echo "local image digest: $LOCAL_DIGEST"

          # push image to get registry digest
          echo "pushing image to registry..."
          PUSH_OUTPUT=$(docker push "$IMAGE_WITH_TAG" 2>&1)
          echo "$PUSH_OUTPUT"

          # extract digest from push output
          REGISTRY_DIGEST=$(echo "$PUSH_OUTPUT" | grep -o "digest: sha256:[a-f0-9]\+" | head -1 | cut -d':' -f3)

          if [ -n "$REGISTRY_DIGEST" ]; then
            echo "found registry digest: sha256:$REGISTRY_DIGEST"
            REPO_PATH=$(echo "$IMAGE_WITH_TAG" | cut -d: -f1)
            IMAGE_WITH_DIGEST="${REPO_PATH}@sha256:${REGISTRY_DIGEST}"
            echo "using pushed image reference with digest: $IMAGE_WITH_DIGEST"

            # tag in Wiz using registry digest
            wizcli docker tag --image "$IMAGE_WITH_DIGEST" && \
            echo "successfully tagged image in Wiz"
          else
            echo "could not extract registry digest, trying with tag reference..."
            wizcli docker tag --image "$IMAGE_WITH_TAG" && \
            echo "successfully tagged image in Wiz using tag reference"
          fi
        else
          echo "::warning::no image tag provided - skipping Wiz tagging step"
        fi
      shell: bash

    - name: Cleanup Docker Image
      if: always()
      run: |
        docker image rm ${{ steps.docker-build.outputs.image-with-tag }} || true
      shell: bash
