name: Container Security Scan
description: Scans container images for vulnerabilities using Wiz CLI

inputs:
  image-name:
    required: false
    description: Docker image name
  image-tag:
    required: true
    description: Docker image tag
  image-platform:
    description: Target platform to build image for (eg. linux/amd64 (default), linux/arm64, etc)
  enable-docker-build:
    required: false
    default: "true"
    description: Enable Docker build
  image-tags:
    required: false
    description: List of tags as key-value pair attributes
    default: ""
  artifactory-username:
    required: false
    description: Artifactory username
  artifactory-auth-token:
    required: false
    description: Artifactory auth token
  build-args:
    required: false
    description: List of build arguments for docker build as key-value pairs
  build-contexts:
    required: false
    description: List of additional build contexts (e.g., name=path)
    default: ""
  docker-config-file:
    required: false
    description: Path to the docker config file (defaults to .docker-config.json) Must contain imageName, may contain dockerfile
    default: .docker-config.json
  github-token:
    required: false
    description: GitHub token
  secrets:
    required: false
    description: List of secrets for docker build as key-value pairs (e.g., SECRET_KEY=VALUE)
  dockerhub-user:
    required: true
    description: DockerHub username
  dockerhub-password:
    required: true
    description: DockerHub password
  MAX_MIND_USER:
    required: false
    description: MaxMind User ID
  MAX_MIND_LICENSE_KEY:
    required: false
    description: MaxMind License Key
  vfunction-file:
    required: false
    description: Vfunction file name
  target:
    required: false
    description: Target build stage for multi-stage Docker builds
  wiz-client-id:
    required: true
    description: Wiz Client ID for service account authentication
  wiz-client-secret:
    required: true
    description: Wiz Client Secret for service account authentication

outputs:
  stdout:
    description: The complete output from the Wiz CLI scan
    value: ${{ steps.scan.outputs.stdout }}
  has_findings:
    description: Whether the scan found any issues
    value: ${{ steps.scan.outputs.has_findings }}
  scan_status:
    description: Status of the scan (success/failure)
    value: ${{ steps.scan.outputs.scan_status }}

runs:
  using: composite
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Wiz CLI
      run: |
        curl -o wizcli https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64
        chmod +x wizcli
        sudo mv wizcli /usr/local/bin/
      shell: bash

    - name: Authenticate with Wiz
      run: wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
      env:
        WIZ_CLIENT_ID: ${{ inputs.wiz-client-id }}
        WIZ_CLIENT_SECRET: ${{ inputs.wiz-client-secret }}
      shell: bash

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-user }}
        password: ${{ inputs.dockerhub-password }}

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image-tag }}
        flavor: |
          latest=false
        tags: |
          ${{ inputs.image-tags }}

    - name: Build docker image
      if: ${{ inputs.enable-docker-build == 'true' }}
      uses: open-turo/actions-security/docker-build@v3
      id: docker-build
      with:
        docker-config-file: ${{ inputs.docker-config-file }}
        dockerhub-user: ${{ inputs.dockerhub-user }}
        dockerhub-password: ${{ inputs.dockerhub-password }}
        github-token: ${{ inputs.github-token }}
        image-platform: ${{ inputs.image-platform }}
        image-version: ${{ inputs.image-tag }}
        build-args: |
          ARTIFACTORY_USERNAME=${{ inputs.artifactory-username }}
          ARTIFACTORY_AUTH_TOKEN=${{ inputs.artifactory-auth-token }}
          MAX_MIND_LICENSE_KEY=${{ inputs.MAX_MIND_LICENSE_KEY }}
          ${{ inputs.build-args }}
        secrets: ${{ inputs.secrets }}

    - name: Determine Image Name
      id: set_image_name
      run: |
        echo "image_name=${{ steps.docker-build.outputs.image-name }}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Get Dockerfile Path
      id: dockerfile-config
      run: |
        if [ ! -f "${{ inputs.docker-config-file }}" ]; then
          echo "::error::Docker config file not found: ${{ inputs.docker-config-file }}" && exit 1
        fi
        dockerfile=$(jq -r '.dockerfile // "./Dockerfile"' ${{ inputs.docker-config-file }})
        echo "dockerfile=${dockerfile}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Scan Container Image
      id: scan
      run: |
        # Debug current directory and Dockerfile path
        echo "Current directory: $(pwd)"
        echo "Dockerfile path from config: ${{ steps.dockerfile-config.outputs.dockerfile }}"
        echo "Directory contents:"
        ls -la

        # Check if Dockerfile exists
        DOCKERFILE_PATH="${{ steps.dockerfile-config.outputs.dockerfile }}"
        if [ ! -f "$DOCKERFILE_PATH" ]; then
          echo "Warning: Dockerfile not found at $DOCKERFILE_PATH, scanning without Dockerfile metadata"
          SCAN_CMD="wizcli docker scan --image ${{ steps.docker-build.outputs.image-with-tag }}"
        else
          echo "Using Dockerfile at: $DOCKERFILE_PATH"
          SCAN_CMD="wizcli docker scan --image ${{ steps.docker-build.outputs.image-with-tag }} --dockerfile $DOCKERFILE_PATH"
        fi

        # Add common scan options
        SCAN_CMD="$SCAN_CMD --secrets --sensitive-data --show-vulnerability-details --format human"

        # Run the scan and capture output
        echo "Running scan command: $SCAN_CMD"
        SCAN_OUTPUT=$($SCAN_CMD 2>&1)
        SCAN_EXIT_CODE=$?

        # Save the output
        echo "stdout<<EOF" >> $GITHUB_OUTPUT
        echo "$SCAN_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # Set status based on exit code
        case $SCAN_EXIT_CODE in
          0)
            echo "has_findings=false" >> $GITHUB_OUTPUT
            echo "scan_status=success" >> $GITHUB_OUTPUT
            echo "Container scan completed successfully with no issues found"
            ;;
          4)
            echo "has_findings=true" >> $GITHUB_OUTPUT
            echo "scan_status=failure" >> $GITHUB_OUTPUT
            echo "::warning::Container scan found security issues that need to be addressed"
            ;;
          *)
            echo "has_findings=true" >> $GITHUB_OUTPUT
            echo "scan_status=error" >> $GITHUB_OUTPUT
            echo "::error::Container scan failed with exit code $SCAN_EXIT_CODE"
            ;;
        esac

        # Always exit with 0 to prevent workflow failure
        exit 0
      shell: bash

    - name: Fetch digest of Docker image for Graph enrichment
      run: wizcli docker tag --image ${{ steps.docker-build.outputs.image-with-tag }}
      shell: bash

    - name: Cleanup Docker Image
      if: always()
      run: |
        docker image rm ${{ steps.docker-build.outputs.image-with-tag }} || true
      shell: bash
